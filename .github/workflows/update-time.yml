name: Update Local Time

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-time:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Get Manila Time
        run: |
          TIME=$(TZ="Asia/Manila" date "+%I:%M %p")
          DATE=$(TZ="Asia/Manila" date "+%B %d, %Y")
          DAY=$(TZ="Asia/Manila" date "+%A")
          sed -i "s/🕐 .*/🕐 UTC+8 — Philippine Standard Time · $DAY, $DATE/" README.md

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update local time"
          git push
